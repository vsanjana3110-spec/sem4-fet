<!DOCTYPE html>
<html>
<head>
<style>
    body{
        font-family: Arial, sans-serif;
        text-align:center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color:white;
        margin-top:50px;
        min-height:100vh;
    }
    button{
        padding:10px 20px;
        margin:10px;
        border:none;
        border-radius:5px;
        background:#38bdf8;
        color:black;
        font-weight:bold;
        cursor:pointer;
    }
    button:hover{
        background:white;
    }
    .container{
        position:relative;
        width:300px;
        height:180px;
        margin:auto;
    }
    .layer{
        position:absolute;
        width:100%;
        height:100%;
        border-radius:12px;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:24px;
        font-weight:bold;
        transition:0.4s;
    }
    #education{
        background:#ef4444;
        z-index:1;
    }
    #skills{
        background:#3b82f6;
        z-index:0;
    }
    #experience{
        background:#22c55e;
        z-index:0;
    }
    .resume-box{
        margin-top:25px;
    }
    .resume-box a{
        display:inline-block;
        padding:10px 18px;
        background:#38bdf8;
        color:#0f172a;
        text-decoration:none;
        border-radius:6px;
        font-weight:bold;
    }
</style>
</head>
<body>
<h2>Using Z-index Layers</h2>
<button onclick="showLayer('education')">Layer 1</button>
<button onclick="showLayer('skills')">Layer 2</button>
<button onclick="showLayer('experience')">Layer 3</button>
<div class="container">
    <div id="education" class="layer">
        Education
    </div>
    <div id="skills" class="layer">
        Skills
    </div>
    <div id="experience" class="layer">
        Experience
    </div>
</div>
<h2 id="status">
    Active Section: Education
</h2>
<div class="resume-box">
    <a href="https://vsanjana3110-spec.github.io/sem4-fet/">
        My Resume
    </a>
</div>
<script>
function showLayer(selectedLayer){
    const layers = document.querySelectorAll('.layer');
    layers.forEach(layer=>{
        layer.style.zIndex = "0";
    });
    document.getElementById(selectedLayer).style.zIndex = "10";
    document.getElementById("status").innerHTML =
    "Active Section: " +
    selectedLayer.charAt(0).toUpperCase() + selectedLayer.slice(1);
}
</script>
</body>
</html>
