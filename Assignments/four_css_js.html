<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            text-align: center;
            /* Your new gradient background */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e6f7ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-group { margin-bottom: 30px; }

        button {
            padding: 10px 20px;
            margin: 0 5px;
            background-color: #00d4ff;
            color: #0f2027;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }

        .container {
            position: relative;
            width: 320px;
            height: 200px;
            margin-top: 20px;
        }

        .box {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Smooth transition for color and stack changes */
            transition: all 0.4s ease;
        }

        /* Initial Professional Colors */
        #box1 { background-color: #1c3d5a; z-index: 3; }
        #box2 { background-color: #234e70; z-index: 2; }
        #box3 { background-color: #2a5d86; z-index: 1; }

    </style>
</head>
<body>

    <h1>Professional Designation Stack</h1>

    <div class="btn-group">
        <button onclick="bringToFront('box1')">Education</button>
        <button onclick="bringToFront('box2')">Skills</button>
        <button onclick="bringToFront('box3')">Experience</button>
    </div>

    <div class="container">
        <div id="box1" class="box">1: Education</div>
        <div id="box2" class="box">2: Skills</div>
        <div id="box3" class="box">3: Experience</div>
    </div>

    <script>
        function bringToFront(selectedId) {
            const boxes = document.querySelectorAll('.box');

            boxes.forEach(box => {
                // Reset all to low z-index and original blue shades
                box.style.zIndex = "1";
                box.style.transform = "scale(1)";
                box.style.color = "#e6f7ff";
                
                if(box.id === 'box1') box.style.backgroundColor = "#1c3d5a";
                if(box.id === 'box2') box.style.backgroundColor = "#234e70";
                if(box.id === 'box3') box.style.backgroundColor = "#2a5d86";
            });

            // Highlight the selected box
            const activeBox = document.getElementById(selectedId);
            activeBox.style.zIndex = "10";
            activeBox.style.backgroundColor = "#ffcc33"; // Gold color change
            activeBox.style.color = "#0f2027";           // Dark text for contrast
            activeBox.style.transform = "scale(1.05)";    // Slight pop-out
        }
    </script>

</body>
</html>
