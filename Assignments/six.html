<!DOCTYPE html>
<html>
<head>
<style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}
</style>
</head>
<body>
<table>
  <tr>
    <th>Courses</th>
    <th>Available seats</th>
    <th>Progress</th>
  </tr>
  <tr>
    <td>Computer science</td>
    <td>120</td>
    <td>completed</td>
  </tr>
  <tr>
    <td>Elctronics</td>
    <td>100</td>
    <td>not yet completed</td>
  </tr>
  <tr>
    <td>Information science+</td>
    <td>60</td>
    <td>not yet completed</td>
  </tr>

</table>
</body>
</html>
