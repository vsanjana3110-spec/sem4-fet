<!DOCTYPE html>
<html>
<head>
<style>
    body{
        font-family: Arial, sans-serif;
        margin:0;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
    }
    .box{
        background: rgba(255,255,255,0.08);
        padding:40px;
        border-radius:12px;
        width:320px;
        text-align:center;
        margin-bottom:20px;
    }
    input{
        width:90%;
        padding:10px;
        margin:10px 0;
        border-radius:6px;
        border:none;
        text-align:center;
    }
    a {
color: white;
background-color: #3399ff;
padding: 8px 12px;
border-radius: 5px;
text-decoration: none;
}

button {
margin-top: 10px;
padding: 8px 12px;
border-radius: 5px;
border: none;
background-color: #66ccff;
color: black;
cursor: pointer;
}
    button{
        width:100%;
        padding:10px;
        background:#38bdf8;
        border:none;
        border-radius:6px;
        font-weight:bold;
        cursor:pointer;
    }
    #studentDetails{
        display:none;
    }
    .error{ color:#ff6b6b; }
    .success{ color:lightgreen; }

    p{
        margin:8px 0;
    }
</style>
</head>
