<!DOCTYPE html>
<html>
<head>
  <title>Population Survey</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      margin: 0;
      color: white;
    }
    form {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
      display: grid;
      gap: 12px;
    }
    input, select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    a {
            color: white;
            background-color: #3399ff;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
        }

        button {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            background-color: #66ccff;
            color: black;
            cursor: pointer;
        }
    fieldset {
      border: 2px solid #4285F4;
      border-radius: 8px;
      padding: 10px;
    }
    legend {
      font-weight: bold;
      color: #4285F4;
    }

    button {
      padding: 10px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .record {
      background: white;
      color: black;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      width: 320px;
    }
  </style>
</head>
<body>
<h2>POPULATION SURVEY</h2>
<form id="surveyForm">
  <input type="text" id="name" placeholder="Enter Name">
  <input type="number" id="age" placeholder="Enter Age">
  <fieldset>
    <legend>Gender</legend>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
  </fieldset>
  <fieldset>
    <legend>Hobbies</legend>
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <input type="checkbox" name="hobby" value="Sports"> Sports
    <input type="checkbox" name="hobby" value="Music"> Music
  </fieldset>
  <select id="status">
    <option value="">Employment Status</option>
    <option>Student</option>
    <option>Employed</option>
    <option>Self-Employed</option>
    <option>Unemployed</option>
  </select>

  <select id="country">
    <option value="">Country</option>
    <option>India</option>
    <option>USA</option>
    <option>Japan</option>
  </select>

  <button type="submit">Submit</button>
</form>
<div id="output"></div>
<p>
<a href="https://vsanjana3110-spec.github.io/sem4-fet/">My Resume</a>
</p>
<script>
const form = document.getElementById("surveyForm");
const output = document.getElementById("output");
let records = [];
form.addEventListener("submit", function(e) {
  e.preventDefault();
  let name = document.getElementById("name").value.trim();
  let age = document.getElementById("age").value.trim();
  let status = document.getElementById("status").value;
  let country = document.getElementById("country").value;

  let gender = document.querySelector('input[name="gender"]:checked');
  let checkboxes = document.querySelectorAll('input[name="hobby"]:checked');
  if (name === "" || age === "" || status === "" || country === "") {
    alert("Please fill all fields");
    return;
  }
  if (!gender) {
    alert("Please select gender");
    return;
  }
  if (checkboxes.length === 0) {
    alert("Please select at least one hobby");
    return;
  }

  let hobbies = [];
  for (let i = 0; i < checkboxes.length; i++) {
    hobbies.push(checkboxes[i].value);
  }
  records.push({
    name: name,
    age: age,
    gender: gender.value,
    hobbies: hobbies.join(", "),
    status: status,
    country: country
  });
  output.innerHTML = "";
  for (let i = 0; i < records.length; i++) {
    let div = document.createElement("div");
    div.className = "record";
    div.innerHTML =
      "<b>Record " + (i + 1) + "</b><br>" +
      "<b>Name:</b> " + records[i].name + "<br>" +
      "<b>Age:</b> " + records[i].age + "<br>" +
      "<b>Gender:</b> " + records[i].gender + "<br>" +
      "<b>Hobbies:</b> " + records[i].hobbies + "<br>" +
      "<b>Status:</b> " + records[i].status + "<br>" +
      "<b>Country:</b> " + records[i].country;
    output.appendChild(div);
  }
  form.reset();
});
</script>
</body>
</html>
